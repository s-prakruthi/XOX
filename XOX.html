<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOX - Tic Tac Toe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-elevated: #12121a;
      --fg: #e8e8ed;
      --muted: #5a5a6e;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --x-color: #ff6b6b;
      --o-color: #00ff88;
      --border: #2a2a3a;
      --card: #16161f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Background atmosphere */
    .bg-pattern {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255, 107, 107, 0.06) 0%, transparent 50%),
        var(--bg);
      z-index: -1;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: -1;
    }

    /* Game board */
    .game-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1;
    }

    .cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cell:hover:not(.disabled)::before {
      opacity: 1;
    }

    .cell:hover:not(.disabled) {
      border-color: var(--accent);
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
    }

    .cell.disabled {
      cursor: not-allowed;
    }

    .cell.x-mark {
      border-color: var(--x-color);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
    }

    .cell.o-mark {
      border-color: var(--o-color);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .cell.winning {
      animation: pulse-win 0.6s ease infinite alternate;
    }

    @keyframes pulse-win {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    /* Mark symbols */
    .mark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      opacity: 0;
      transform: scale(0.5);
      animation: mark-appear 0.3s ease forwards;
    }

    @keyframes mark-appear {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .mark-x {
      color: var(--x-color);
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }

    .mark-o {
      color: var(--o-color);
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    /* Status display */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .status-badge.x-turn {
      border-color: var(--x-color);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.15);
    }

    .status-badge.o-turn {
      border-color: var(--o-color);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
    }

    /* Buttons */
    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 255, 136, 0.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border-color: var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--muted);
      background: var(--card);
    }

    /* Score cards */
    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .score-card.x-card:hover,
    .score-card.x-card.active {
      border-color: var(--x-color);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.1);
    }

    .score-card.o-card:hover,
    .score-card.o-card.active {
      border-color: var(--o-color);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
    }

    .score-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
    }

    /* Mode selector */
    .mode-selector {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }

    .mode-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: var(--muted);
      border: none;
    }

    .mode-btn.active {
      background: var(--bg);
      color: var(--fg);
    }

    .mode-btn:hover:not(.active) {
      color: var(--fg);
    }

    /* Entrance animations */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    /* Win overlay */
    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .win-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .win-content {
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .win-overlay.active .win-content {
      transform: scale(1);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>

  <!-- Header -->
  <header class="text-center mb-8 fade-up">
    <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-2">
      <span class="text-[var(--x-color)]">X</span>
      <span class="text-[var(--muted)] mx-1">/</span>
      <span class="text-[var(--o-color)]">O</span>
      <span class="text-[var(--muted)] mx-1">/</span>
      <span class="text-[var(--x-color)]">X</span>
    </h1>
    <p class="text-[var(--muted)] text-sm font-mono">Tic-Tac-Toe</p>
  </header>

  <!-- Mode Selector -->
  <div class="mode-selector mb-6 fade-up delay-1">
    <button class="mode-btn active" data-mode="pvp" onclick="setMode('pvp')">
      Player vs Player
    </button>
    <button class="mode-btn" data-mode="ai" onclick="setMode('ai')">
      Player vs AI
    </button>
  </div>

  <!-- Score Board -->
  <div class="flex gap-4 mb-6 fade-up delay-1">
    <div class="score-card x-card" id="x-score-card">
      <div class="text-[var(--x-color)] text-sm font-semibold mb-1">Player X</div>
      <div class="score-value text-[var(--x-color)]" id="x-score">0</div>
    </div>
    <div class="score-card">
      <div class="text-[var(--muted)] text-sm font-semibold mb-1">Draws</div>
      <div class="score-value text-[var(--muted)]" id="draw-score">0</div>
    </div>
    <div class="score-card o-card" id="o-score-card">
      <div class="text-[var(--o-color)] text-sm font-semibold mb-1" id="o-label">Player O</div>
      <div class="score-value text-[var(--o-color)]" id="o-score">0</div>
    </div>
  </div>

  <!-- Status -->
  <div class="mb-6 fade-up delay-2">
    <div class="status-badge x-turn" id="status">
      <span class="status-icon font-mono text-[var(--x-color)]">X</span>
      <span class="status-text">Your turn</span>
    </div>
  </div>

  <!-- Game Board -->
  <div class="game-board fade-up delay-2" id="board">
    <div class="cell" data-index="0" onclick="handleCellClick(0)"></div>
    <div class="cell" data-index="1" onclick="handleCellClick(1)"></div>
    <div class="cell" data-index="2" onclick="handleCellClick(2)"></div>
    <div class="cell" data-index="3" onclick="handleCellClick(3)"></div>
    <div class="cell" data-index="4" onclick="handleCellClick(4)"></div>
    <div class="cell" data-index="5" onclick="handleCellClick(5)"></div>
    <div class="cell" data-index="6" onclick="handleCellClick(6)"></div>
    <div class="cell" data-index="7" onclick="handleCellClick(7)"></div>
    <div class="cell" data-index="8" onclick="handleCellClick(8)"></div>
  </div>

  <!-- Controls -->
  <div class="flex gap-3 mt-8 fade-up delay-3">
    <button class="btn btn-primary" onclick="resetGame()">New Game</button>
    <button class="btn btn-ghost" onclick="resetAll()">Reset Scores</button>
  </div>

  <!-- Win Overlay -->
  <div class="win-overlay" id="win-overlay" onclick="closeOverlay()">
    <div class="win-content" onclick="event.stopPropagation()">
      <div class="text-6xl font-bold mb-4 font-mono" id="win-icon"></div>
      <h2 class="text-2xl font-bold mb-2" id="win-title">Game Over</h2>
      <p class="text-[var(--muted)] mb-6" id="win-message"></p>
      <button class="btn btn-primary" onclick="resetGame(); closeOverlay();">Play Again</button>
    </div>
  </div>

  <script>
    // Game State
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameActive = true;
    let gameMode = 'pvp';
    let scores = { X: 0, O: 0, draw: 0 };

    // Winning combinations
    const winPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
      [0, 4, 8], [2, 4, 6]             // Diagonals
    ];

    // DOM Elements
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const xScoreEl = document.getElementById('x-score');
    const oScoreEl = document.getElementById('o-score');
    const drawScoreEl = document.getElementById('draw-score');
    const xScoreCard = document.getElementById('x-score-card');
    const oScoreCard = document.getElementById('o-score-card');
    const oLabel = document.getElementById('o-label');
    const winOverlay = document.getElementById('win-overlay');
    const winIcon = document.getElementById('win-icon');
    const winTitle = document.getElementById('win-title');
    const winMessage = document.getElementById('win-message');

    // Set game mode
    function setMode(mode) {
      gameMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      oLabel.textContent = mode === 'ai' ? 'AI' : 'Player O';
      resetGame();
    }

    // Handle cell click
    function handleCellClick(index) {
      if (!gameActive || board[index] !== '') return;

      makeMove(index, currentPlayer);

      if (gameActive && gameMode === 'ai' && currentPlayer === 'O') {
        setTimeout(makeAIMove, 400);
      }
    }

    // Make a move
    function makeMove(index, player) {
      board[index] = player;
      const cell = cells[index];
      
      const mark = document.createElement('span');
      mark.className = `mark mark-${player.toLowerCase()}`;
      mark.textContent = player;
      cell.appendChild(mark);
      cell.classList.add(`${player.toLowerCase()}-mark`, 'disabled');

      if (checkWin(player)) {
        gameActive = false;
        highlightWinningCells(player);
        scores[player]++;
        updateScores();
        showWinOverlay(player);
        return;
      }

      if (checkDraw()) {
        gameActive = false;
        scores.draw++;
        updateScores();
        showWinOverlay('draw');
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus();
    }

    // AI Move (Minimax inspired)
    function makeAIMove() {
      if (!gameActive) return;

      const bestMove = findBestMove();
      if (bestMove !== -1) {
        makeMove(bestMove, 'O');
      }
    }

    // Find best move for AI
    function findBestMove() {
      // Check for winning move
      for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
          board[i] = 'O';
          if (checkWin('O')) {
            board[i] = '';
            return i;
          }
          board[i] = '';
        }
      }

      // Block player's winning move
      for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
          board[i] = 'X';
          if (checkWin('X')) {
            board[i] = '';
            return i;
          }
          board[i] = '';
        }
      }

      // Take center if available
      if (board[4] === '') return 4;

      // Take a corner
      const corners = [0, 2, 6, 8];
      const availableCorners = corners.filter(i => board[i] === '');
      if (availableCorners.length > 0) {
        return availableCorners[Math.floor(Math.random() * availableCorners.length)];
      }

      // Take any available edge
      const edges = [1, 3, 5, 7];
      const availableEdges = edges.filter(i => board[i] === '');
      if (availableEdges.length > 0) {
        return availableEdges[Math.floor(Math.random() * availableEdges.length)];
      }

      return -1;
    }

    // Check for win
    function checkWin(player) {
      return winPatterns.some(pattern => 
        pattern.every(index => board[index] === player)
      );
    }

    // Check for draw
    function checkDraw() {
      return board.every(cell => cell !== '');
    }

    // Get winning pattern
    function getWinningPattern(player) {
      return winPatterns.find(pattern => 
        pattern.every(index => board[index] === player)
      );
    }

    // Highlight winning cells
    function highlightWinningCells(player) {
      const pattern = getWinningPattern(player);
      if (pattern) {
        pattern.forEach(index => {
          cells[index].classList.add('winning');
        });
      }
    }

    // Update status display
    function updateStatus() {
      const isX = currentPlayer === 'X';
      statusEl.className = `status-badge ${isX ? 'x-turn' : 'o-turn'}`;
      
      const icon = statusEl.querySelector('.status-icon');
      const text = statusEl.querySelector('.status-text');
      
      icon.textContent = currentPlayer;
      icon.className = `status-icon font-mono ${isX ? 'text-[var(--x-color)]' : 'text-[var(--o-color)]'}`;
      
      if (gameMode === 'ai') {
        text.textContent = currentPlayer === 'X' ? 'Your turn' : 'AI thinking...';
      } else {
        text.textContent = 'Your turn';
      }

      // Update score card active states
      xScoreCard.classList.toggle('active', isX);
      oScoreCard.classList.toggle('active', !isX);
    }

    // Update scores
    function updateScores() {
      xScoreEl.textContent = scores.X;
      oScoreEl.textContent = scores.O;
      drawScoreEl.textContent = scores.draw;
    }

    // Show win overlay
    function showWinOverlay(result) {
      if (result === 'draw') {
        winIcon.textContent = '—';
        winIcon.style.color = 'var(--muted)';
        winTitle.textContent = "It's a Draw!";
        winMessage.textContent = 'Great minds think alike.';
      } else {
        winIcon.textContent = result;
        winIcon.style.color = result === 'X' ? 'var(--x-color)' : 'var(--o-color)';
        
        if (gameMode === 'ai') {
          winTitle.textContent = result === 'X' ? 'You Win!' : 'AI Wins!';
          winMessage.textContent = result === 'X' ? 'Congratulations!' : 'Better luck next time.';
        } else {
          winTitle.textContent = `Player ${result} Wins!`;
          winMessage.textContent = 'Well played!';
        }
      }
      
      winOverlay.classList.add('active');
    }

    // Close overlay
    function closeOverlay() {
      winOverlay.classList.remove('active');
    }

    // Reset game
    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameActive = true;

      cells.forEach(cell => {
        cell.innerHTML = '';
        cell.className = 'cell';
      });

      updateStatus();
    }

    // Reset all (including scores)
    function resetAll() {
      scores = { X: 0, O: 0, draw: 0 };
      updateScores();
      resetGame();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      const key = parseInt(e.key);
      if (key >= 1 && key <= 9 && gameActive) {
        const index = key - 1;
        // Convert numpad layout to board index
        const mapping = [6, 7, 8, 3, 4, 5, 0, 1, 2];
        handleCellClick(mapping[index]);
      }
      
      if (e.key === 'r' || e.key === 'R') {
        resetGame();
      }
      
      if (e.key === 'Escape') {
        closeOverlay();
      }
    });

    // Initialize
    updateStatus();
  </script>
</body>
</html>
